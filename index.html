.bg-dim{position:fixed;inset:0;z-index:1;background:rgba(0,0,0,.35)}
.app{position:relative;z-index:2;min-height:100vh;padding-top:56px;padding-bottom:72px}
.topbar{position:fixed;top:12px;left:50%;transform:translateX(-50%);z-index:50;background:rgba(10,8,4,.7);backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px);border:1px solid rgba(255,255,255,.15);padding:10px 20px;display:flex;align-items:center;gap:12px;border-radius:50px}
.topbar h1{font-size:14px;font-weight:700;color:#fff;white-space:nowrap;cursor:pointer}
.topbar .mb{background:none;border:none;font-size:18px;color:#fff;cursor:pointer;padding:2px 4px}
.screen{display:none;padding:16px}.screen.active{display:block}
.glass{background:rgba(10,8,4,.55);backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);border-radius:16px;padding:20px;border:1px solid rgba(255,255,255,.08)}
.welcome{text-align:center;padding:30px 16px;max-width:560px;margin:0 auto}
.welcome h2{font-size:28px;font-weight:800;color:#fff;margin:0 0 18px;text-shadow:0 2px 8px rgba(0,0,0,.7)}
.sbtn{display:inline-block;padding:14px 40px;background:#e8a020;color:#1a1208;border:none;border-radius:28px;font-size:15px;font-weight:700;cursor:pointer;font-family:inherit;box-shadow:0 4px 24px rgba(200,120,20,.5)}
.fsh{font-size:12px;font-weight:700;color:#e8a020;margin:16px 0 10px;text-transform:uppercase;letter-spacing:1px}
.fd{margin:0 0 14px}.fd label{display:block;font-size:12px;font-weight:700;color:#fff;margin:0 0 5px;text-transform:uppercase;letter-spacing:.5px;text-shadow:0 1px 3px rgba(0,0,0,.5)}
.fd input,.fd select,.fd textarea{width:100%;padding:12px 14px;border:1.5px solid rgba(255,255,255,.3);border-radius:10px;font-size:15px;font-family:inherit;color:#fff;background:rgba(10,8,4,.6);outline:none;-webkit-appearance:none}
.fd input:focus,.fd select:focus,.fd textarea:focus{border-color:#e8a020;background:rgba(10,8,4,.75)}
.fd input::placeholder,.fd textarea::placeholder{color:rgba(255,255,255,.4)}
.fd select option{background:#1a1208;color:#fff}.fd textarea{resize:vertical;min-height:60px}
.fr{display:flex;gap:10px}.fr .fd{flex:1}
.btn{padding:12px 22px;border:none;border-radius:12px;font-size:14px;font-weight:700;cursor:pointer;font-family:inherit}.btn:active{opacity:.85}
.bp{background:#e8a020;color:#1a1208}.bs2{background:rgba(255,255,255,.12);color:#fff;border:1px solid rgba(255,255,255,.2)}

<body>
<div class="bg"></div><div class="bg-dim"></div>
<div class="app">

</div>

<div class="dsp"></div><button class="dwi dng" onclick="delTree()">&#128465; Delete this tree</button></div></div>

<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-database-compat.js"></script>
<script>
firebase.initializeApp({
  apiKey:"AIzaSyC_Ml6gsVvVIFF-Swt5leAEFCo3gOgf2_4",
  authDomain:"sood-sud-family-tree.firebaseapp.com",
  databaseURL:"https://sood-sud-family-tree-default-rtdb.firebaseio.com",
  projectId:"sood-sud-family-tree",
  storageBucket:"sood-sud-family-tree.firebasestorage.app",
  messagingSenderId:"24950825162",
  appId:"1:24950825162:web:29f1440a472d4a285e5433"
});
var db=firebase.database();
var CUR=null,PP={},SELF=null,NID=1,TNAME='',_listener=null;

function esc(s){return s?s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'):''}
function ini(n){return n?n.split(' ').map(function(w){return w.charAt(0)}).slice(0,2).join('').toUpperCase():'?'}
function gid(){return 'p'+(NID++)}
function bindDate(el){if(!el)return;el.setAttribute('inputmode','numeric');el.setAttribute('maxlength','10');el.addEventListener('input',function(){var v=this.value.replace(/\D/g,'');if(v.length>8)v=v.slice(0,8);if(v.length>=5)v=v.slice(0,2)+'/'+v.slice(2,4)+'/'+v.slice(4);else if(v.length>=3)v=v.slice(0,2)+'/'+v.slice(2);this.value=v})}

/* === FIREBASE STORAGE === */
function fbSaveTree(){if(!CUR)return;db.ref('trees/'+CUR).set({pp:PP,self:SELF,nid:NID,name:TNAME});db.ref('treeList/'+CUR).set({name:TNAME,count:Object.keys(PP).length})}
function fbLoadList(cb){db.ref('treeList').once('value').then(function(snap){var v=snap.val()||{};var arr=[];for(var k in v)arr.push({id:k,name:v[k].name,count:v[k].count||0});cb(arr)})}
function fbLoadTree(tid,cb){db.ref('trees/'+tid).once('value').then(function(snap){var d=snap.val();if(d&&d.pp){PP=d.pp;SELF=d.self;NID=d.nid||100;TNAME=d.name||'Tree';CUR=tid;cb(true)}else cb(false)})}
function fbListenTree(tid){if(_listener)db.ref('trees/'+_listener).off();_listener=tid;db.ref('trees/'+tid).on('value',function(snap){var d=snap.val();if(d&&d.pp&&CUR===tid){PP=d.pp;SELF=d.self;NID=d.nid||100;TNAME=d.name||'Tree';var active=document.querySelector('.screen.active');if(active&&active.id==='tree-screen')renderTree()}})}
function fbStopListen(){if(_listener){db.ref('trees/'+_listener).off();_listener=null}}

/* === HOME === */
function renderHome(){db.ref('treeOrder').once('value').then(function(oSnap){var order=oSnap.val()||[];fbLoadList(function(list){if(order.length){list.sort(function(a,b){var ai=order.indexOf(a.id),bi=order.indexOf(b.id);if(ai===-1)ai=999;if(bi===-1)bi=999;return ai-bi})}var h='';list.forEach(function(t,i){h+='<div class="tc" style="display:flex;align-items:center;gap:10px"><div style="flex:1;cursor:pointer" onclick="openTree(\''+t.id+'\')"><h4>'+esc(t.name)+'</h4><p>'+t.count+' people</p></div><div style="display:flex;flex-direction:column;gap:2px">';if(i>0)h+='<button style="background:none;border:none;color:rgba(255,255,255,.5);font-size:16px;cursor:pointer;padding:2px 6px" onclick="event.stopPropagation();mvTree('+i+',-1)">&#9650;</button>';if(i<list.length-1)h+='<button style="background:none;border:none;color:rgba(255,255,255,.5);font-size:16px;cursor:pointer;padding:2px 6px" onclick="event.stopPropagation();mvTree('+i+',1)">&#9660;</button>';h+='</div></div>'});document.getElementById('treeList').innerHTML=h||'<p style="color:rgba(255,255,255,.4);font-size:14px">No trees yet. Create one!</p>'})})}
function newTree(){document.getElementById('ntm').classList.add('show');setTimeout(function(){bindDate(document.getElementById('nt_dob'))},50)}
function createTree(){var nm=(document.getElementById('nt_name')||{}).value?.trim();var yn=(document.getElementById('nt_yname')||{}).value?.trim();if(!nm){alert('Enter a tree name.');return}if(!yn){alert('Enter your name.');return}var tid='t'+Date.now();CUR=tid;PP={};NID=1;TNAME=nm;var id=gid();PP[id]={id:id,name:yn,nickname:'',gender:(document.getElementById('nt_gender')||{}).value||'Male',dob:((document.getElementById('nt_dob')||{}).value||'').trim(),dod:'',location:'',education1:'',education2:'',profession:'',company:'',about:'',hobbies:'',spouseId:null,parents:[],children:[]};SELF=id;fbSaveTree();document.getElementById('ntm').classList.remove('show');document.getElementById('bn').style.display='flex';fbListenTree(tid);go('tree-screen')}
function openTree(tid){document.getElementById('tree').innerHTML='<div class="loading">Loading...</div>';fbLoadTree(tid,function(ok){if(ok){document.getElementById('bn').style.display='flex';fbListenTree(tid);go('tree-screen')}})}
function backToList(){fbStopListen();CUR=null;PP={};SELF=null;document.getElementById('bn').style.display='none';go('home-screen')}
function mvTree(idx,dir){db.ref('treeOrder').once('value').then(function(oSnap){var order=oSnap.val()||[];fbLoadList(function(list){if(order.length){list.sort(function(a,b){var ai=order.indexOf(a.id),bi=order.indexOf(b.id);if(ai===-1)ai=999;if(bi===-1)bi=999;return ai-bi})}else{order=list.map(function(t){return t.id})}var ids=list.map(function(t){return t.id});var ni=idx+dir;if(ni<0||ni>=ids.length)return;var tmp=ids[idx];ids[idx]=ids[ni];ids[ni]=tmp;db.ref('treeOrder').set(ids).then(function(){renderHome()})})})}
function delTree(){if(!CUR)return;if(!confirm('Delete tree "'+TNAME+'"?'))return;db.ref('trees/'+CUR).remove();db.ref('treeList/'+CUR).remove();tDr();backToList()}

/* === RELATIONS === */
function getRelation(tid){
  if(!SELF||!PP[SELF]||tid===SELF)return 'You';var me=PP[SELF],t=PP[tid];if(!t)return '';var g=t.gender;
  if(me.spouseId===tid)return g==='Male'?'Husband':'Wife';
  if(me.parents&&me.parents.indexOf(tid)>-1)return g==='Male'?'Father':'Mother';
  if(me.children&&me.children.indexOf(tid)>-1)return g==='Male'?'Son':'Daughter';
  if(me.parents&&me.parents.length){for(var i=0;i<me.parents.length;i++){var par=PP[me.parents[i]];if(par&&par.children&&par.children.indexOf(tid)>-1)return g==='Male'?'Brother':'Sister'}}
  if(me.parents){for(var i=0;i<me.parents.length;i++){var par=PP[me.parents[i]];if(par&&par.parents&&par.parents.indexOf(tid)>-1)return g==='Male'?'Grandfather':'Grandmother';if(par&&par.parents){for(var j=0;j<par.parents.length;j++){var gp=PP[par.parents[j]];if(gp&&gp.spouseId===tid)return g==='Male'?'Grandfather':'Grandmother'}}}}
  if(me.parents){for(var i=0;i<me.parents.length;i++){var par=PP[me.parents[i]];if(!par||!par.parents)continue;for(var j=0;j<par.parents.length;j++){var gp=PP[par.parents[j]];if(!gp||!gp.parents)continue;if(gp.parents.indexOf(tid)>-1)return g==='Male'?'Great-Grandfather':'Great-Grandmother'}}}
  if(me.children){for(var i=0;i<me.children.length;i++){var ch=PP[me.children[i]];if(ch&&ch.children&&ch.children.indexOf(tid)>-1)return g==='Male'?'Grandson':'Granddaughter'}}
  if(me.parents){for(var i=0;i<me.parents.length;i++){var par=PP[me.parents[i]];if(!par||!par.parents)continue;for(var j=0;j<par.parents.length;j++){var gp=PP[par.parents[j]];if(!gp||!gp.children)continue;for(var k=0;k<gp.children.length;k++){if(gp.children[k]!==me.parents[i]&&gp.children[k]===tid)return g==='Male'?'Uncle':'Aunt';var ua=PP[gp.children[k]];if(ua&&ua.spouseId===tid&&gp.children[k]!==me.parents[i])return g==='Male'?'Uncle':'Aunt'}}}}
  if(me.parents){for(var i=0;i<me.parents.length;i++){var par=PP[me.parents[i]];if(!par||!par.parents)continue;for(var j=0;j<par.parents.length;j++){var gp=PP[par.parents[j]];if(!gp||!gp.children)continue;for(var k=0;k<gp.children.length;k++){if(gp.children[k]===me.parents[i])continue;var ua=PP[gp.children[k]];if(ua&&ua.children&&ua.children.indexOf(tid)>-1)return 'Cousin'}}}}
  if(me.spouseId&&PP[me.spouseId]){var sp=PP[me.spouseId];if(sp.parents&&sp.parents.indexOf(tid)>-1)return g==='Male'?'Father-in-law':'Mother-in-law';if(sp.parents){for(var i=0;i<sp.parents.length;i++){var spar=PP[sp.parents[i]];if(spar&&spar.children){for(var k=0;k<spar.children.length;k++){if(spar.children[k]!==me.spouseId&&spar.children[k]===tid)return g==='Male'?'Brother-in-law':'Sister-in-law'}}}}}
  if(me.parents&&me.parents.length){for(var i=0;i<me.parents.length;i++){var par=PP[me.parents[i]];if(!par||!par.children)continue;for(var k=0;k<par.children.length;k++){var sib=PP[par.children[k]];if(sib&&sib.id!==SELF&&sib.spouseId===tid)return g==='Male'?'Brother-in-law':'Sister-in-law';if(sib&&sib.id!==SELF&&sib.children&&sib.children.indexOf(tid)>-1)return g==='Male'?'Nephew':'Niece'}}}
  return '';
}

/* === FORM === */
function buildForm(person,mode,ctx){var p=person||{};var area=document.getElementById('formArea');var h='';
  if(mode==='edit')h+='<h2 style="font-size:20px;font-weight:800;color:#fff;margin:0 0 16px">Edit '+esc((p.name||'').split(' ')[0])+'</h2>';
  h+='<div class="fsh">Basic</div><div class="fd"><label>Full name</label><input id="ff_name" value="'+esc(p.name||'')+'" placeholder="Full name"></div>';
  h+='<div class="fd"><label>Nickname</label><input id="ff_nick" value="'+esc(p.nickname||'')+'" placeholder="e.g. DJ, Munna"></div>';
  h+='<div class="fr"><div class="fd"><label>Gender</label><select id="ff_gender"><option value="Male"'+(p.gender==='Male'?' selected':'')+'>Male</option><option value="Female"'+(p.gender==='Female'?' selected':'')+'>Female</option></select></div>';
  h+='<div class="fd"><label>Date of birth</label><input id="ff_dob" value="'+esc(p.dob||'')+'" placeholder="DD/MM/YYYY"></div></div>';
  h+='<div class="fr"><div class="fd"><label>Date of passing</label><input id="ff_dod" value="'+esc(p.dod||'')+'" placeholder="DD/MM/YYYY"></div>';
  h+='<div class="fd"><label>Location</label><input id="ff_loc" value="'+esc(p.location||'')+'" placeholder="City, State, Country"></div></div>';
  h+='<div class="fsh">Education &amp; Career</div>';
  h+='<div class="fr"><div class="fd"><label>Education 1</label><input id="ff_edu1" value="'+esc(p.education1||'')+'" placeholder="e.g. Bachelors"></div>';
  h+='<div class="fd"><label>Education 2</label><input id="ff_edu2" value="'+esc(p.education2||'')+'" placeholder="e.g. Masters"></div></div>';
  h+='<div class="fr"><div class="fd"><label>Profession</label><input id="ff_prof" value="'+esc(p.profession||'')+'" placeholder="e.g. Engineer"></div>';
  h+='<div class="fd"><label>Company</label><input id="ff_comp" value="'+esc(p.company||'')+'" placeholder="Company"></div></div>';
  h+='<div class="fsh">Other</div><div class="fd"><label>About</label><textarea id="ff_about" placeholder="A short bio">'+esc(p.about||'')+'</textarea></div>';
  h+='<div class="fd"><label>Hobbies</label><input id="ff_hob" value="'+esc(p.hobbies||'')+'" placeholder="e.g. Reading, Cricket"></div>';
  h+='<div class="brow"><button class="btn bp" style="flex:1" onclick="saveEdit(\''+ctx+'\')">Save</button><button class="btn bs2" onclick="go(\'tree-screen\')">Cancel</button></div>';

function findRoots(){var seen={},roots=[];for(var id in PP){if(seen[id])continue;var p=PP[id];if(!p.parents||!p.parents.length){var sp=p.spouseId;if(sp&&PP[sp]&&(!PP[sp].parents||!PP[sp].parents.length)){seen[id]=seen[sp]=1;roots.push([id,sp])}else if(!sp||!PP[sp]){var isSp=false;for(var o in PP){if(PP[o].spouseId===id&&PP[o].parents&&PP[o].parents.length){isSp=true;break}}if(!isSp){seen[id]=1;roots.push([id,null])}}}}if(!roots.length&&SELF&&PP[SELF]){var top=SELF;for(var i=0;i<20;i++){if(PP[top]&&PP[top].parents&&PP[top].parents.length)top=PP[top].parents[0];else break}roots.push([top,PP[top]?PP[top].spouseId:null])}return roots}
function getKids(a,b){var c={};if(PP[a])(PP[a].children||[]).forEach(function(k){if(PP[k])c[k]=1});if(b&&PP[b])(PP[b].children||[]).forEach(function(k){if(PP[k])c[k]=1});return Object.keys(c)}

function mkCouple(a,b){return '<div class="couple">'+mkNode(a)+(b&&PP[b]?'<div class="cl">&#10084;&#65039;</div>'+mkNode(b):'')+'</div>'}
function vl(h){return '<div class="vl vl-gold" style="height:'+h+'px"></div>'}
function mkUnit(pid,sid,depth){if(depth>10)return'';var kids=getKids(pid,sid);var h='<div class="fam">'+mkCouple(pid,sid);if(kids.length){h+=vl(18);if(kids.length>1){h+='<div class="kw">';kids.forEach(function(cid,i){var cp=PP[cid];if(!cp)return;var csp=cp.spouseId||null;var first=i===0,last=i===kids.length-1;h+='<div class="kc"><div style="display:flex;height:3px"><div style="flex:1;'+(first?'':'background:rgba(253,232,160,.65)')+'"></div><div style="width:3px;background:rgba(253,232,160,.65)"></div><div style="flex:1;'+(last?'':'background:rgba(253,232,160,.65)')+'"></div></div>';h+=vl(14);var gk=getKids(cid,csp);if(gk.length||csp)h+=mkUnit(cid,csp,depth+1);else h+=mkNode(cid);h+='</div>'});h+='</div>';}else{h+=vl(14);var cid=kids[0],cp=PP[cid],csp=cp?cp.spouseId:null;if(getKids(cid,csp).length||csp)h+=mkUnit(cid,csp,depth+1);else h+=mkNode(cid)}}return h+'</div>'}

function showMega(){
  document.querySelectorAll('.screen').forEach(function(s){s.classList.remove('active')});
  document.getElementById('mega-screen').classList.add('active');
  document.getElementById('bn').style.display='flex';
  document.querySelectorAll('.bnav button').forEach(function(b){b.classList.remove('active')});
  document.getElementById('tt').textContent='All Families';
  document.getElementById('mega').innerHTML='<div class="loading">Loading all trees...</div>';
  db.ref('trees').once('value').then(function(snap){
    var allT=snap.val()||{};var mPP={};var tNames={};
    for(var tid in allT){var tr=allT[tid];if(!tr||!tr.pp)continue;tNames[tid]=tr.name||'Tree';
      for(var pid in tr.pp){var p=JSON.parse(JSON.stringify(tr.pp[pid]));var mId=tid+'_'+pid;
        p.id=mId;p._tn=tr.name;p._tid=tid;p._oid=pid;
        if(p.spouseId)p.spouseId=tid+'_'+p.spouseId;
        if(p.parents)p.parents=p.parents.map(function(x){return tid+'_'+x});
        else p.parents=[];
        if(p.children)p.children=p.children.map(function(x){return tid+'_'+x});
        else p.children=[];
        if(p.links&&p.links.length){p.links.forEach(function(lk){
          if(!lk.relation)return;var oId=lk.treeId+'_'+lk.personId;
          if(lk.relation==='parent'&&p.parents.indexOf(oId)===-1)p.parents.push(oId);
          if(lk.relation==='child'&&p.children.indexOf(oId)===-1)p.children.push(oId);
          if(lk.relation==='spouse'&&!p.spouseId)p.spouseId=oId;
        })}
        mPP[mId]=p;
      }
    }
    renderMega(mPP,tNames);
  })
}
function renderMega(mPP,tNames){
  var seen={},roots=[];
  for(var id in mPP){if(seen[id])continue;var p=mPP[id];
    if(!p.parents||!p.parents.length||!p.parents.some(function(x){return mPP[x]})){
      var sp=p.spouseId;
      if(sp&&mPP[sp]&&(!mPP[sp].parents||!mPP[sp].parents.length||!mPP[sp].parents.some(function(x){return mPP[x]}))){
        seen[id]=seen[sp]=1;roots.push([id,sp])}
      else if(!sp||!mPP[sp]){var isSp=false;for(var o in mPP){if(mPP[o].spouseId===id&&mPP[o].parents&&mPP[o].parents.some(function(x){return mPP[x]})){isSp=true;break}}if(!isSp){seen[id]=1;roots.push([id,null])}}
    }
  }
  /* Calculate relationship to root using the global getRelation */
  var savedPP=PP,savedSELF=SELF;var megaRoot=roots.length?roots[0][0]:null;
  PP=mPP;SELF=megaRoot;
  var relCache={};for(var mid in mPP)relCache[mid]=getRelation(mid);
  PP=savedPP;SELF=savedSELF;
  function mGetKids(a,b){var c={};if(mPP[a])(mPP[a].children||[]).forEach(function(k){if(mPP[k])c[k]=1});if(b&&mPP[b])(mPP[b].children||[]).forEach(function(k){if(mPP[k])c[k]=1});return Object.keys(c)}
  function mNode(id){var p=mPP[id];if(!p)return'';var g=p.gender==='Male'?'m':'f';
    var sub=[];if(p.dob)sub.push('b.\u00a0'+esc(p.dob));if(p.dod)sub.push('d.\u00a0'+esc(p.dod));
    var rel=relCache[id]||'';
    return '<div class="node" onclick="megaTap(\''+p._tid+'\',\''+p._oid+'\')">'
      +'<div class="av '+g+'">'+ini(p.name)+'</div>'
      +'<div class="nlbl"><div class="nn">'+esc(p.name)+'</div>'
      +(sub.length?'<div class="ns">'+sub.join(' &middot; ')+'</div>':'')
      +(rel?'<div class="nr">'+esc(rel)+'</div>':'')+'</div></div>'}
  function mCouple(a,b){return '<div class="couple">'+mNode(a)+(b&&mPP[b]?'<div class="cl">&#10084;&#65039;</div>'+mNode(b):'')+'</div>'}
  function mUnit(pid,sid,depth){if(depth>10)return'';var kids=mGetKids(pid,sid);
    var h='<div class="fam">'+mCouple(pid,sid);
    if(kids.length){h+=vl(18);if(kids.length>1){h+='<div class="kw">';kids.forEach(function(cid,i){var cp=mPP[cid];if(!cp)return;var csp=cp.spouseId||null;var first=i===0,last=i===kids.length-1;h+='<div class="kc"><div style="display:flex;height:3px"><div style="flex:1;'+(first?'':'background:rgba(253,232,160,.65)')+'"></div><div style="width:3px;background:rgba(253,232,160,.65)"></div><div style="flex:1;'+(last?'':'background:rgba(253,232,160,.65)')+'"></div></div>';h+=vl(14);var gk=mGetKids(cid,csp);if(gk.length||csp)h+=mUnit(cid,csp,depth+1);else h+=mNode(cid);h+='</div>'});h+='</div>';}else{h+=vl(14);var cid=kids[0],cp=mPP[cid],csp=cp?cp.spouseId:null;if(mGetKids(cid,csp).length||csp)h+=mUnit(cid,csp,depth+1);else h+=mNode(cid)}}return h+'</div>'}
  var html='';roots.forEach(function(r,i){if(i>0)html+='<div style="height:30px"></div>';html+=mUnit(r[0],r[1],0)});
  document.getElementById('mega').innerHTML=html||'<div class="loading">No data or no cross-tree links found.</div>'}
function megaTap(tid,pid){fbStopListen();fbLoadTree(tid,function(ok){if(ok){document.getElementById('bn').style.display='flex';fbListenTree(tid);showP(pid)}})}

/* === MENU === */
function tDr(){document.getElementById('dr').classList.toggle('show')}
function doExp(){var b=new Blob([JSON.stringify({pp:PP,self:SELF,nid:NID,name:TNAME},null,2)],{type:'application/json'});var a=document.createElement('a');a.href=URL.createObjectURL(b);a.download=(TNAME||'family-tree').replace(/\s+/g,'-').toLowerCase()+'.json';a.click()}
function doImp(e){var f=e.target.files[0];if(!f)return;var r=new FileReader();r.onload=function(ev){try{var d=JSON.parse(ev.target.result);if(!d.pp){alert('Invalid.');return}var tid='t'+Date.now();CUR=tid;PP=d.pp;SELF=d.self;NID=d.nid||100;TNAME=d.name||'Imported Tree';fbSaveTree();document.getElementById('bn').style.display='flex';fbListenTree(tid);go('tree-screen')}catch(x){alert('Invalid.')}};r.readAsText(f);e.target.value=''}
function doImpMerge(e){var f=e.target.files[0];if(!f)return;var r=new FileReader();r.onload=function(ev){try{var d=JSON.parse(ev.target.result);if(!d.pp){alert('Invalid.');return}var n=0;for(var id in d.pp){if(!PP[id]){PP[id]=d.pp[id];n++}else{var ex=PP[id],inc=d.pp[id];['nickname','dob','dod','location','education1','education2','profession','company','about','hobbies'].forEach(function(f){if(!ex[f]&&inc[f])ex[f]=inc[f]})}}if(d.nid>NID)NID=d.nid;fbSaveTree();go('tree-screen');alert(n+' new people merged!')}catch(x){alert('Invalid.')}};r.readAsText(f);e.target.value=''}

window.addEventListener('afterprint',function(){if(CUR){document.getElementById('bn').style.display='flex';go('tree-screen')}});
renderHome();
</script>
